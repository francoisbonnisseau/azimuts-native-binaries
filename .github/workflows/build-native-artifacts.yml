name: Build Native Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: azimuts-native-helpers-v1.1.0

permissions:
  contents: write

jobs:
  macos-audio-tap:
    name: Build macOS audio tap (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: arm64-apple-macosx14.2
          - arch: x64
            target: x86_64-apple-macosx14.2
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS audio tap
        run: |
          mkdir -p build dist .swift-module-cache
          info_plist="macos-audio-tap/macos-audio-tap-Info.plist"
          test -f "$info_plist"
          xcrun swiftc macos-audio-tap/macos-audio-tap.swift \
            -O \
            -target "${{ matrix.target }}" \
            -module-cache-path .swift-module-cache \
            -o build/macos-audio-tap \
            -framework CoreAudio \
            -framework AudioToolbox \
            -framework AVFoundation \
            -framework Foundation \
            -Xlinker -sectcreate \
            -Xlinker __TEXT \
            -Xlinker __info_plist \
            -Xlinker "$info_plist"
          chmod 755 build/macos-audio-tap
          codesign --force --options runtime --identifier com.openwhispr.audio-tap --sign - build/macos-audio-tap
          codesign --verify --deep --strict build/macos-audio-tap
          codesign -d --verbose=4 build/macos-audio-tap 2>&1 | tee build/macos-audio-tap.codesign.txt
          file build/macos-audio-tap | tee build/macos-audio-tap.file.txt
          strings build/macos-audio-tap | grep -q "NSAudioCaptureUsageDescription"
          strings build/macos-audio-tap | grep -q "silent_capture"
          if [ "${{ matrix.arch }}" = "x64" ]; then
            grep -q "x86_64" build/macos-audio-tap.file.txt
          else
            grep -q "arm64" build/macos-audio-tap.file.txt
          fi
          tar -czf "dist/macos-audio-tap-darwin-${{ matrix.arch }}.tar.gz" -C build macos-audio-tap
      - uses: actions/upload-artifact@v4
        with:
          name: macos-audio-tap-darwin-${{ matrix.arch }}
          path: dist/macos-audio-tap-darwin-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  windows-mic-listener:
    name: Build Windows mic listener
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows mic listener
        shell: cmd
        run: |
          mkdir build
          mkdir dist
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /O2 /nologo windows-mic-listener\windows-mic-listener.c /Fe:build\windows-mic-listener.exe ole32.lib oleaut32.lib user32.lib uuid.lib mmdevapi.lib
          powershell -NoProfile -Command "Compress-Archive -Path build\windows-mic-listener.exe -DestinationPath dist\windows-mic-listener-win32-x64.zip -Force"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-mic-listener-win32-x64
          path: dist/windows-mic-listener-win32-x64.zip
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - macos-audio-tap
      - windows-mic-listener
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#azimuts-native-helpers-v}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Azimuts Native Helpers v$version" \
              --notes "Native helper artifacts built from Azimuts Desktop sources for reproducible pilot builds."
          gh release upload "$TAG" \
            dist/macos-audio-tap-darwin-arm64.tar.gz \
            dist/macos-audio-tap-darwin-x64.tar.gz \
            dist/windows-mic-listener-win32-x64.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
